services:
  postgres:
    image: postgres:16-alpine
    container_name: course-registration-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-course_registration}
      POSTGRES_USER: ${POSTGRES_USER:-course_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-course_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-course_user} -d ${POSTGRES_DB:-course_registration}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
